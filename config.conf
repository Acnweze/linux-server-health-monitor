# Linux Server Health Monitor Configuration

# CPU usage warning threshold (%)
CPU_THRESHOLD=80

# Memory usage warning threshold (%)
MEMORY_THRESHOLD=80

# Disk usage warning threshold (%)
DISK_THRESHOLD=80


# Services to monitor
SERVICES=("ssh" "nginx")


# Report directory
REPORT_DIR="reports"


# Enable network checks
CHECK_NETWORK=true


# Enable service monitoring
CHECK_SERVICES=true
